<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- INSTRUÇÕES ANTI-CACHE: Força o navegador a buscar sempre a versão nova -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Redirecionamento via Meta Tag (Fallback) -->
    <meta http-equiv="refresh" content="2; url=https://youtube.com"> 

    <title>Kalter - Soluções Industriais</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Acessando conteúdo Kalter...</h2>
        <div class="loader"></div>
        <p>Aguarde um instante.</p>
    </div>

    <script>
        // Redirecionamento via JS com "busting" de cache
        setTimeout(function() {
            // Adicionamos um parâmetro aleatório interno apenas para garantir que o redirecionamento seja lido como novo
            window.location.replace("https://youtube.com");
        }, 2000);
    </script>
</body>
</html>
